<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QaKarmaPolice Art</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

.cover{
    width:100%;
    background:#000;
}

.cover img{
    width:100%;
    height:auto;
    display:block;
    border-radius:0;
}

h1{
    margin-top:40px;
    font-size:3em;
}

p{
    color:#bbbbbb;
    margin-bottom:50px;
}

.gallery{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:30px;
    padding:30px;
}

.gallery img{
    width:500px;
    border-radius:12px;
    transition:.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

</style>

</head>

<body>

<header class="cover">
    <img src="COUVERTURE-KARMA.png" alt="QaKarmaPolice">
</header>

<h1>QaKarmaPolice Art</h1>

<p>Laisser respirer l'image.</p>

<div class="gallery">

    <img src="CASTLE V FINAL 4K.png" alt="Gundyr Castle">

</div>

</body>
</html>
